<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <defs>
    <!-- Define the conic gradient for the animated border -->
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4545" />
      <stop offset="25%" stop-color="#00ff99" />
      <stop offset="50%" stop-color="#006aff" />
      <stop offset="75%" stop-color="#ff0095" />
      <stop offset="100%" stop-color="#ff4545" />
    </linearGradient>

    <!-- Define the glowing blur filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- CSS Animation for spinning border -->
    <style>
      @keyframes spin-border {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -400; }
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .border-animation {
        animation: spin-border 3s linear infinite;
      }
      .glow-animation {
        animation: pulse-glow 1.5s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="60" rx="12" fill="#1c1f2b" />

  <!-- Glowing border (behind the button) -->
  <rect x="2" y="2" width="196" height="56" rx="10" 
        fill="none" stroke="url(#rainbow)" stroke-width="6" 
        class="glow-animation" filter="url(#glow)" />

  <!-- Solid animated border -->
  <rect x="2" y="2" width="196" height="56" rx="10" 
        fill="none" stroke="url(#rainbow)" stroke-width="3" 
        class="border-animation" />

  <!-- LinkedIn Logo -->
  <svg x="20" y="15" width="30" height="30" viewBox="0 0 24 24" fill="white">
    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
  </svg>

  <!-- Text -->
  <text x="65" y="38" font-family="Arial, sans-serif" 
        font-size="20" fill="white" font-weight="bold">
    LinkedIn
  </text>
</svg>
